        /* Minimalist Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Glass Panel Minimalista */
        .glass-panel {
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Interações das Tarefas */
        .task-row { transition: all 0.2s ease; border-left: 3px solid transparent; }
        .task-row:not(.done):hover { background: rgba(255, 255, 255, 0.03); transform: translateX(2px); }
        
        .task-checkbox { transition: all 0.2s ease; }
        .task-row:not(.done):hover .task-checkbox { border-color: #71717a; }
        
        .task-row.done { opacity: 0.5; background: rgba(24, 24, 27, 0.8); border-left-color: #10b981; }
        .task-row.done .task-title { text-decoration: line-through; color: #71717a; }

        /* Bloqueio de Seleção para Cliques Rápidos */
        .select-none { user-select: none; -webkit-user-select: none; }

        /* Animação Inicial Suave */
        .animate-fade { animation: fade 0.4s ease-out forwards; }
        @keyframes fade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

        // ==========================================
        // 2. ALGORITMO ROUND-ROBIN (Progressão Uniforme)
        // ==========================================
        // Esta função garante que as matérias rodam de forma igual
        function createRoundRobin(poolsObj) {
            const keys = Object.keys(poolsObj);
            let currentIndex = 0;
            return function pull() {
                let attempts = 0;
                while(attempts < keys.length) {
                    const key = keys[currentIndex];
                    currentIndex = (currentIndex + 1) % keys.length;
                    if(poolsObj[key].length > 0) {
                        return { subject: key, title: poolsObj[key].shift() };
                    }
                    attempts++;
                }
                return null;
            }
        }

            // Construir Apostila Pools Dinamicamente para evitar Reference Errors
            const poolsApostila = {};

                if(!poolsApostila[task.s]) poolsApostila[task.s] = [];
                poolsApostila[task.s].push(task.t);
            });

            const poolUrca = [...urcaTasks];

            const pullFerretto = createRoundRobin(poolsFerretto);
            const pullApostila = createRoundRobin(poolsApostila);

            const weekDays = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
            const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            
            const startDate = new Date();
            startDate.setHours(0, 0, 0, 0);

            // Regras Exatas: Ferretto e Apostila (Seg-Sáb), URCA (Seg, Qua, Sex)
            const activeUrca = [1, 3, 5]; 

            for (let i = 1; i <= 120; i++) {
                const currentDate = new Date(startDate);
                currentDate.setDate(startDate.getDate() + (i - 1));
                const dayOfWeek = currentDate.getDay();
                const isRest = dayOfWeek === 0; 
                const dayTasks = [];

                if (!isRest) {
                    // Ferretto (2-3 por dia)
                    const qtdFerretto = (dayOfWeek === 1 || dayOfWeek === 3 || dayOfWeek === 5) ? 2 : 3; 
                    for(let j=0; j<qtdFerretto; j++) {
                        const t = pullFerretto();
                        if(t) dayTasks.push({ id: Math.random().toString(36).substr(2, 9), block: 1, tag: 'Videoaula', subject: t.subject, title: t.title, done: false, icon: 'fa-play' });
                    }

                    // Apostila (1-2 por dia)
                    const qtdApo = (dayOfWeek === 2 || dayOfWeek === 4 || dayOfWeek === 6) ? 2 : 1; 
                    for(let j=0; j<qtdApo; j++) {
                        const t = pullApostila();
                        if(t) dayTasks.push({ id: Math.random().toString(36).substr(2, 9), block: 2, tag: 'Apostila', subject: t.subject, title: t.title, done: false, icon: 'fa-book-open' });
                    }

                    // URCA (1-2 por dia, 3x na semana)
                    if (activeUrca.includes(dayOfWeek)) {
                        const qtdLit = (dayOfWeek === 1 || dayOfWeek === 5) ? 2 : 1; 
                        for(let j=0; j<qtdLit; j++) {
                            if(poolUrca.length > 0) {
                                dayTasks.push({ id: Math.random().toString(36).substr(2, 9), block: 3, tag: 'URCA', subject: 'Literatura', title: poolUrca.shift(), done: false, icon: 'fa-pen-nib' });
                            }
                        }
                    }
                }

                allDays.push({
                    day: i, dateString: `${currentDate.getDate().toString().padStart(2, '0')}/${(currentDate.getMonth() + 1).toString().padStart(2, '0')}`,
                    fullDateString: `${currentDate.getDate()} de ${months[currentDate.getMonth()]}`,
                    weekDayName: weekDays[dayOfWeek], isRest: isRest, tasks: dayTasks
                });
            }

            // Distribuir sobras finais (Safety Net)
            let d = 119;
            while(true) {
                let added = false;
                const f = pullFerretto();
                if(f) { allDays[d].tasks.push({ id: Math.random().toString(36).substr(2, 9), block: 1, tag: 'Videoaula', subject: f.subject, title: f.title, done: false, icon: 'fa-play' }); added=true; }
                
                const a = pullApostila();
                if(a) { allDays[d].tasks.push({ id: Math.random().toString(36).substr(2, 9), block: 2, tag: 'Apostila', subject: a.subject, title: a.title, done: false, icon: 'fa-book-open' }); added=true; }
                
                if(activeUrca.includes(new Date(startDate.getTime() + (d * 86400000)).getDay()) && poolUrca.length > 0) {
                    allDays[d].tasks.push({ id: Math.random().toString(36).substr(2, 9), block: 3, tag: 'URCA', subject: 'Literatura', title: poolUrca.shift(), done: false, icon: 'fa-pen-nib' }); added=true;
                }

                if(!added && poolUrca.length===0) break;
                d--; if (d < 0) d = 119;
            }

            allDays.forEach(day => { day.tasks.sort((a, b) => a.block - b.block); });
            return allDays;
        }

        // ==========================================
        // 3. ESTADO & CORES
        // ==========================================
        let appState = {
            schedule: JSON.parse(localStorage.getItem('min_pro_data_v2')) || generateSchedule(),
            activeDay: parseInt(localStorage.getItem('min_pro_day_v2')) || 1,
            view: 'daily'
        };

        function saveState() {
            localStorage.setItem('min_pro_data_v2', JSON.stringify(appState.schedule));
            localStorage.setItem('min_pro_day_v2', appState.activeDay.toString());
        }

        function getSubjectColor(subject) {
            if(!subject) return 'text-zinc-400 bg-zinc-800 border-zinc-700';
            if(subject.includes('Matemática')) return 'text-blue-400 bg-blue-500/10 border-blue-500/20';
            if(subject.includes('Biologia')) return 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20';
            if(subject.includes('Física') && !subject.includes('Ed. Física')) return 'text-amber-400 bg-amber-500/10 border-amber-500/20';
            if(subject.includes('História')) return 'text-yellow-400 bg-yellow-500/10 border-yellow-500/20';
            if(subject.includes('Filosofia') || subject.includes('Socio')) return 'text-purple-400 bg-purple-500/10 border-purple-500/20';
            if(subject.includes('Química')) return 'text-pink-400 bg-pink-500/10 border-pink-500/20';
            if(subject.includes('Português') || subject.includes('Literatura')) return 'text-rose-400 bg-rose-500/10 border-rose-500/20';
            if(subject.includes('Geografia')) return 'text-teal-400 bg-teal-500/10 border-teal-500/20';
            if(subject.includes('Ed. Física')) return 'text-cyan-400 bg-cyan-500/10 border-cyan-500/20';
            return 'text-indigo-400 bg-indigo-500/10 border-indigo-500/20';
        }

        // ==========================================
        // 4. RENDERS & TARGETED DOM UPDATES
        // ==========================================
        function renderHeader() {
            const total = appState.schedule.reduce((acc, d) => acc + d.tasks.length, 0);
            const completed = appState.schedule.reduce((acc, d) => acc + d.tasks.filter(t => t.done).length, 0);
            const pct = total === 0 ? 0 : Math.round((completed / total) * 100);

            document.getElementById('dashboard-header').innerHTML = `
                <div class="glass-panel rounded-2xl p-6 md:p-8 flex flex-col md:flex-row justify-between items-center gap-8">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <h1 class="text-3xl font-semibold text-white tracking-tight">Estratégia <span class="text-zinc-400 font-normal">120 Dias</span></h1>
                        </div>
                        <p class="text-textMuted text-sm">Progresso uniforme: Básicas (Seg-Sáb) • Literatura URCA (Seg, Qua, Sex)</p>
                    </div>
                    <div class="flex items-center gap-5 bg-zinc-900/50 p-4 rounded-xl border border-border min-w-[240px]">
                        <div class="flex-1">
                            <div class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-1">Taxa de Sucesso</div>
                            <div class="flex items-baseline gap-2">
                                <span class="text-2xl font-bold text-white">${pct}%</span>
                                <span class="text-xs text-zinc-500">${completed}/${total}</span>
                            </div>
                        </div>
                        <div class="w-12 h-12 rounded-full border-4 border-zinc-800 flex items-center justify-center relative">
                            <svg class="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                                <circle class="text-white stroke-current" stroke-width="8" stroke-linecap="round" fill="transparent" cx="50" cy="50" r="46" style="stroke-dasharray: 289; stroke-dashoffset: ${289 - (pct/100)*289}; transition: stroke-dashoffset 1s ease-out;"></circle>
                            </svg>
                        </div>
                    </div>
                </div>
            `;
        }

        function getDailyTaskHTML(dIdx, tIdx, task) {
            return `
                <div id="task-${dIdx}-${tIdx}" onclick="toggleTask(${dIdx}, ${tIdx})" class="task-row p-4 rounded-xl border border-border bg-surface/50 flex items-start gap-4 cursor-pointer select-none mb-3 ${task.done ? 'done' : ''}">
                    <div class="task-checkbox mt-0.5 w-5 h-5 rounded border flex items-center justify-center shrink-0 ${task.done ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-zinc-600 bg-transparent'}">
                        ${task.done ? '<i class="fa-solid fa-check text-[10px]"></i>' : ''}
                    </div>
                    <div class="flex-1">
                        <div class="flex flex-wrap items-center gap-2 mb-1.5">
                            <span class="text-[9px] uppercase font-bold tracking-widest px-2 py-0.5 rounded border ${getSubjectColor(task.subject)}">
                                ${task.subject}
                            </span>
                            <span class="text-[9px] font-semibold text-zinc-400 px-2 py-0.5 rounded bg-zinc-800 border border-zinc-700 uppercase">
                                <i class="fa-solid ${task.icon} mr-1"></i> ${task.tag}
                            </span>
                        </div>
                        <h4 class="text-sm font-medium text-zinc-200 task-title leading-relaxed">
                            ${task.title}
                        </h4>
                    </div>
                </div>
            `;
        }

        function renderDailyView() {
            const current = appState.schedule[appState.activeDay - 1];
            const isCompleted = current && current.tasks.length > 0 && current.tasks.every(t => t.done);

            const calendarGrid = appState.schedule.map(d => {
                const isActive = appState.activeDay === d.day;
                const isDone = !d.isRest && d.tasks.every(t => t.done);
                let classes = "border rounded-xl py-3 flex flex-col items-center justify-center cursor-pointer transition-all duration-200 select-none ";
                
                if(isActive) classes += "bg-white text-black border-white shadow-md z-10";
                else if(d.isRest) classes += "bg-transparent border-transparent text-zinc-600 opacity-60 hover:opacity-100 hover:bg-zinc-900";
                else if(isDone) classes += "bg-emerald-950/30 border-emerald-900/50 text-emerald-500 hover:bg-emerald-900/20";
                else classes += "bg-surface border-border text-zinc-400 hover:border-zinc-500 hover:text-zinc-200";

                return `
                    <div id="cal-day-${d.day}" onclick="changeDay(${d.day})" class="${classes}" title="${d.isRest ? 'Domingo' : d.fullDateString}">
                        <span class="text-[9px] uppercase font-bold tracking-wider mb-0.5 opacity-60">D${d.day}</span>
                        <span class="text-xs font-semibold">${d.dateString}</span>
                    </div>
                `;
            }).join('');

            let tasksList = '';
            if (current.isRest) {
                tasksList = `
                    <div class="flex flex-col items-center justify-center h-full py-16 text-center select-none animate-fade">
                        <i class="fa-solid fa-mug-hot text-4xl text-zinc-600 mb-4"></i>
                        <h3 class="text-xl font-semibold text-white mb-2">Domingo Livre</h3>
                        <p class="text-textMuted text-sm max-w-sm">O cronograma foca o esforço de Segunda a Sábado. Usa o Domingo para descanso total.</p>
                    </div>
                `;
            } else {
                tasksList = current.tasks.map((task, idx) => getDailyTaskHTML(appState.activeDay - 1, idx, task)).join('');
            }

            return `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fade">
                    <div class="lg:col-span-4 glass-panel rounded-2xl p-5 h-[680px] flex flex-col">
                        <h3 class="text-xs font-semibold text-zinc-500 mb-4 uppercase tracking-[0.15em] flex items-center justify-center gap-2 select-none">
                            Calendário 120D
                        </h3>
                        <div id="calendar-container" class="grid grid-cols-4 gap-2 overflow-y-auto pr-2 custom-scroll flex-1 pb-4">
                            ${calendarGrid}
                        </div>
                    </div>

                    <div class="lg:col-span-8 glass-panel rounded-2xl p-6 md:p-8 h-[680px] flex flex-col">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 pb-6 border-b border-border select-none">
                            <div>
                                <h2 class="text-3xl font-semibold text-white flex items-center gap-3 mb-1">
                                    Dia ${appState.activeDay}
                                    <span class="text-xs font-medium bg-zinc-800 text-zinc-300 px-3 py-1 rounded-md border border-zinc-700">
                                        ${current.weekDayName}
                                    </span>
                                </h2>
                                <p id="daily-counter" class="text-textMuted text-sm mt-1">
                                    ${current.isRest ? 'Dia 100% Livre.' : (isCompleted ? '<span class="text-emerald-500">Todas as missões concluídas!</span>' : `Restam <span class="text-white">${current.tasks.filter(t=>!t.done).length}</span> tópicos para hoje.`)}
                                </p>
                            </div>
                            <div class="flex gap-2 mt-4 sm:mt-0">
                                <button onclick="changeDay(${appState.activeDay - 1})" class="w-10 h-10 flex items-center justify-center bg-surface border border-border hover:bg-zinc-800 text-zinc-300 rounded-lg transition-colors disabled:opacity-30 cursor-pointer" ${appState.activeDay === 1 ? 'disabled' : ''}>
                                    <i class="fa-solid fa-chevron-left text-sm"></i>
                                </button>
                                <button onclick="changeDay(${appState.activeDay + 1})" class="w-10 h-10 flex items-center justify-center bg-surface border border-border hover:bg-zinc-800 text-zinc-300 rounded-lg transition-colors disabled:opacity-30 cursor-pointer" ${appState.activeDay === 120 ? 'disabled' : ''}>
                                    <i class="fa-solid fa-chevron-right text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <div id="tasks-container" class="flex-1 overflow-y-auto pr-3 custom-scroll pb-6">
                            ${tasksList}
                        </div>
                    </div>
                </div>
            `;
        }

        function getOverviewTaskHTML(dIdx, tIdx, task) {
            return `
                <div id="ov-task-${dIdx}-${tIdx}" onclick="toggleTask(${dIdx}, ${tIdx})" class="text-sm p-3 rounded-lg border border-border bg-surface/30 flex items-start gap-3 cursor-pointer select-none transition-colors task-row ${task.done ? 'done' : 'hover:border-zinc-600 hover:bg-zinc-800/50'}">
                    <div class="mt-0.5 w-4 h-4 rounded border flex items-center justify-center shrink-0 task-checkbox ${task.done ? 'bg-emerald-500 border-emerald-500' : 'border-zinc-600 bg-transparent'}">
                        ${task.done ? '<i class="fa-solid fa-check text-[9px] text-white"></i>' : ''}
                    </div>
                    <div class="flex-1">
                        <div class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest mb-1 flex items-center gap-2">
                            <span class="bg-zinc-800 px-1.5 py-0.5 rounded text-zinc-400">D${task.day}</span>
                            ${task.subject}
                        </div>
                        <span class="block text-zinc-300 font-medium task-title">${task.title}</span>
                    </div>
                </div>
            `;
        }

        function buildOverview() {
            const categories = [
                { id: 'Videoaula', label: 'Videoaulas', icon: 'fa-play' },
                { id: 'Apostila', label: 'Apostila Base', icon: 'fa-book-open' },
                { id: 'URCA', label: 'Literatura URCA', icon: 'fa-pen-nib' }
            ];
            
            let html = categories.map(cat => {
                const catTasks = [];
                appState.schedule.forEach((d, dIdx) => d.tasks.forEach((t, tIdx) => { 
                    if(t.tag === cat.id) { t.day = d.day; catTasks.push({ task: t, dIdx, tIdx }); }
                }));
                
                if(catTasks.length === 0) return '';
                const done = catTasks.filter(item=>item.task.done).length;
                let items = catTasks.map(item => getOverviewTaskHTML(item.dIdx, item.tIdx, item.task)).join('');

                return `
                    <div class="glass-panel rounded-2xl p-6 flex flex-col h-[550px]">
                        <div class="flex justify-between items-center mb-5 pb-4 border-b border-border select-none">
                            <h3 class="text-sm font-semibold text-white flex items-center gap-2">
                                <i class="fa-solid ${cat.icon} text-zinc-400"></i> ${cat.label}
                            </h3>
                            <span id="ov-count-${cat.id.replace(/\s+/g, '-')}" class="text-xs font-medium text-zinc-400">
                                ${done} / ${catTasks.length}
                            </span>
                        </div>
                        <div class="flex-1 overflow-y-auto pr-2 custom-scroll space-y-2 pb-4">
                            ${items}
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="animate-fade">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        ${html}
                    </div>
                </div>
            `;
        }

        function renderApp() {
            renderHeader();
            const main = document.getElementById('app-content');
            if (appState.view === 'daily') main.innerHTML = renderDailyView();
            else main.innerHTML = buildOverview();
        }

        // --- AÇÕES UI E TARGETED UPDATES ---
        window.switchView = function(view) {
            if(appState.view === view) return;
            appState.view = view;
            
            const btnDaily = document.getElementById('tab-daily');
            const btnList = document.getElementById('tab-overview');
            
            if(view === 'daily') {
                btnDaily.className = "flex-1 sm:flex-none px-6 py-2 text-sm font-medium rounded-lg transition-all duration-200 select-none bg-white text-black shadow-sm";
                btnList.className = "flex-1 sm:flex-none px-6 py-2 text-sm font-medium rounded-lg transition-all duration-200 select-none text-textMuted hover:text-white hover:bg-zinc-800/50";
            } else {
                btnList.className = "flex-1 sm:flex-none px-6 py-2 text-sm font-medium rounded-lg transition-all duration-200 select-none bg-white text-black shadow-sm";
                btnDaily.className = "flex-1 sm:flex-none px-6 py-2 text-sm font-medium rounded-lg transition-all duration-200 select-none text-textMuted hover:text-white hover:bg-zinc-800/50";
            }
            renderApp();
        }

        window.changeDay = function(d) {
            if(d >= 1 && d <= 120 && d !== appState.activeDay) {
                appState.activeDay = d;
                saveState();
                renderApp();
            }
        }

        window.toggleTask = function(dIdx, tIdx) {
            const task = appState.schedule[dIdx].tasks[tIdx];
            task.done = !task.done;
            saveState();
            
            renderHeader(); // Atualiza barra global
            
            // Targeted DOM Update (Atualiza apenas o elemento clicado)
            if (appState.view === 'daily') {
                const taskEl = document.getElementById(`task-${dIdx}-${tIdx}`);
                if (taskEl) taskEl.outerHTML = getDailyTaskHTML(dIdx, tIdx, task);
                
                // Atualiza contadores locais do Dia
                const current = appState.schedule[dIdx];
                const isCompleted = current.tasks.length > 0 && current.tasks.every(t => t.done);
                document.getElementById('daily-counter').innerHTML = isCompleted ? '<span class="text-emerald-500">Todas as missões concluídas!</span>' : `Restam <span class="text-white">${current.tasks.filter(t=>!t.done).length}</span> tópicos para hoje.`;
                
                // Refresca a cor do botão do calendário
                const calBtn = document.getElementById(`cal-day-${current.day}`);
                if(calBtn) {
                    const isActive = appState.activeDay === current.day;
                    let classes = "border rounded-xl py-3 flex flex-col items-center justify-center cursor-pointer transition-all duration-200 select-none ";
                    if(isActive) classes += "bg-white text-black border-white shadow-md z-10";
                    else if(current.isRest) classes += "bg-transparent border-transparent text-zinc-600 opacity-60";
                    else if(isCompleted) classes += "bg-emerald-950/30 border-emerald-900/50 text-emerald-500";
                    else classes += "bg-surface border-border text-zinc-400";
                    
                    calBtn.className = classes;
                }
            } else {
                const taskEl = document.getElementById(`ov-task-${dIdx}-${tIdx}`);
                if (taskEl) {
                    task.day = appState.schedule[dIdx].day;
                    taskEl.outerHTML = getOverviewTaskHTML(dIdx, tIdx, task);
                }
                
                // Atualizar contadores na visão geral
                ['Videoaula', 'Apostila', 'URCA'].forEach(catId => {
                    let total=0; let done=0;
                    appState.schedule.forEach(d => d.tasks.forEach(t => { if(t.tag === catId) { total++; if(t.done) done++; }}));
                    const countEl = document.getElementById(`ov-count-${catId.replace(/\s+/g, '-')}`);
                    if(countEl) countEl.innerHTML = `${done} / ${total}`;
                });
            }
        }

        // Modais
        window.openModal = function() {
            const m = document.getElementById('modalReset');
            const c = document.getElementById('modalContent');
            m.classList.remove('opacity-0', 'pointer-events-none');
            c.classList.remove('scale-95');
        }

        window.closeModal = function() {
            const m = document.getElementById('modalReset');
            const c = document.getElementById('modalContent');
            c.classList.add('scale-95');
            m.classList.add('opacity-0');
            setTimeout(() => m.classList.add('pointer-events-none'), 300);
        }

        window.executeReset = function() {
            appState.schedule = generateSchedule();
            appState.activeDay = 1;
            saveState();
            closeModal();
            renderApp();
        }

        // --- INICIAR APP ---
        renderApp();
    </script>
</body>
</html>
